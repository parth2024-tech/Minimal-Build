kind = "web"
previewPath = "/"
title = "PrivatePulse Analytics"
version = "1.0.0"
id = "artifacts/analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19193

[services.development]
run = "pnpm --filter @workspace/analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/analytics", "run", "build" ]
publicDir = "artifacts/analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19193"
BASE_PATH = "/"
